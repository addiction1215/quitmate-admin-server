name: 🚀 배포

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev  # dev 환경 secrets 사용
    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
      USER_BUCKET: ${{ secrets.USER_BUCKET }}
      CHALLENGE_BUCKET: ${{ secrets.CHALLENGE_BUCKET }}
      CHALLENGE_BADGE_BUCKET: ${{ secrets.CHALLENGE_BADGE_BUCKET }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: 🔨 JDK 17 세팅
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔨 gradlew 실행 권한 설정
        run: chmod +x gradlew

      - name: 🔨 Gradle 캐시 설정
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔑 SSH 키 설정
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: 🔑 Ubuntu 호스트 추가
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: 🔥 FCM 설정 파일 가져오기
        run: |
          mkdir -p src/main/resources
          scp ubuntu@${{ secrets.SERVER_IP }}:/home/ubuntu/fcm/addiction-firebase.json ./src/main/resources/addiction-firebase.json

      - name: 🔨 Gradle 빌드
        run: ./gradlew build --parallel

      - name: 📦 jar, 배포 스크립트 복사
        run: |
          mkdir -p before-deploy-admin
          cp ./build/libs/*.jar ./before-deploy-admin/
          cp -r ./scripts/dev/ ./before-deploy-admin/scripts/

      - name: 🗜️ 배포 패키지 생성
        run: zip -r -qq ./deploy.zip ./before-deploy-admin/

      - name: 🚀 서버에 파일 업로드
        run: |
          scp ./deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/home/ubuntu/deploy.zip
          ssh ubuntu@${{ secrets.DEV_SERVER_IP }} "
            unzip -o /home/ubuntu/deploy.zip -d /home/ubuntu &&
            rm -rf /home/ubuntu/admin-app/* &&
            mv /home/ubuntu/before-deploy-admin/* /home/ubuntu/admin-app/ &&
            chmod +x /home/ubuntu/admin-app/scripts/*.sh"

      - name: 🎯 Ubuntu 서버에서 배포 실행
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "/home/ubuntu/admin-app/scripts/run_new_was.sh"

      - name: 🎯 Ubuntu 서버에서 Health Checking
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "/home/ubuntu/admin-app/scripts/health.sh"

#      - name: 🎯 Ubuntu 서버에서 Blue/Green Switching
#        run: |
#          ssh ubuntu@${{ secrets.DEV_SERVER_IP }} "/home/ubuntu/admin-app/scripts/switch.sh"

      - name: 🧹 임시 파일 정리
        run: |
          ssh ubuntu@${{ secrets.SERVER_IP }} "
            rm -rf /home/ubuntu/deploy.zip /home/ubuntu/before-deploy-admin"
